<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; background: #fff; }
.modal-bg { min-height: 700px; background: rgba(0,0,0,0.35); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; border-radius: 10px; }
.modal { background: #fff; border-radius: 12px; border: 1px solid #e5e5e2; width: 100%; max-width: 540px; overflow: hidden; }
.modal-head { padding: 16px 24px; border-bottom: 1px solid #e5e5e2; display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-size: 16px; font-weight: 500; }
.close-x { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 4px; line-height: 1; }
.modal-body { padding: 20px 24px; }
.modal-foot { padding: 16px 24px; border-top: 1px solid #e5e5e2; display: flex; justify-content: flex-end; gap: 8px; }
.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; font-size: 14px; padding: 8px 12px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; }
.field textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
.type-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.type-pill { font-size: 12px; padding: 6px 12px; border: 1px solid #d0d0d0; border-radius: 8px; background: transparent; color: #1a1a1a; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.type-pill:hover { background: #f5f5f3; }
.type-pill.active { background: #534AB7; color: #fff; border-color: #534AB7; }
.drop-zone { border: 1.5px dashed #d0d0d0; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: background 0.15s; }
.drop-zone:hover { background: #f5f5f3; }
.drop-icon { font-size: 13px; color: #888; line-height: 1.6; }
.drop-icon strong { color: #534AB7; }
.btn-m { font-size: 13px; padding: 8px 18px; border: 1px solid #d0d0d0; border-radius: 8px; background: transparent; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.btn-m:hover { background: #f5f5f3; }
.btn-m-primary { background: #534AB7; color: #fff; border-color: #534AB7; }
.btn-m-primary:hover { background: #3C3489; }
.section-label { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 12px; padding-top: 16px; border-top: 1px solid #e5e5e2; }
.hidden { display: none; }
.entity-badge { font-size: 12px; color: #888; background: #f5f5f3; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-bottom: 16px; }
</style>

<div class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h3>Record transaction</h3>
      <button class="close-x">&times;</button>
    </div>
    <div class="modal-body">
      <div class="entity-badge">ABP Real Estate Fund III, LP</div>

      <div class="field">
        <label>Transaction type</label>
        <div class="type-pills" id="typePills">
          <button class="type-pill active" data-type="gift">Gift</button>
          <button class="type-pill" data-type="sale">Sale</button>
          <button class="type-pill" data-type="redemption">Redemption</button>
          <button class="type-pill" data-type="issuance">New issuance</button>
          <button class="type-pill" data-type="estate">Estate transfer</button>
        </div>
      </div>

      <div class="field">
        <label>Effective date</label>
        <input type="date" value="2026-04-14" />
      </div>

      <div id="fields-gift">
        <div class="field-row">
          <div class="field">
            <label>From holder</label>
            <select>
              <option value="">Select transferor...</option>
              <option>Sullivan Irrevocable Trust</option>
              <option>Bunker Family Trust</option>
              <option>Peterson Holdings, LLC</option>
              <option>Chen Investment Partners</option>
              <option>Martinez Living Trust</option>
              <option>Whitfield Capital, LP</option>
              <option>Nakamura Family Office</option>
            </select>
          </div>
          <div class="field">
            <label>To holder</label>
            <select>
              <option value="">Select transferee...</option>
              <option>Bunker Family Trust</option>
              <option>Peterson Holdings, LLC</option>
              <option>Chen Investment Partners</option>
              <option>Martinez Living Trust</option>
              <option>Whitfield Capital, LP</option>
              <option>Nakamura Family Office</option>
              <option>Sullivan Irrevocable Trust</option>
              <option style="color: #534AB7;">+ Add new holder...</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Equity class</label>
            <select>
              <option>LP interest (%)</option>
              <option>GP interest (%)</option>
            </select>
          </div>
          <div class="field">
            <label>Amount transferred</label>
            <input type="text" placeholder="e.g., 5.00%" />
          </div>
        </div>
      </div>

      <div id="fields-sale" class="hidden">
        <div class="field-row">
          <div class="field">
            <label>From holder (seller)</label>
            <select><option value="">Select seller...</option><option>Sullivan Irrevocable Trust</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option></select>
          </div>
          <div class="field">
            <label>To holder (buyer)</label>
            <select><option value="">Select buyer...</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option><option>Sullivan Irrevocable Trust</option><option style="color: #534AB7;">+ Add new holder...</option></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Equity class</label>
            <select><option>LP interest (%)</option><option>GP interest (%)</option></select>
          </div>
          <div class="field">
            <label>Amount transferred</label>
            <input type="text" placeholder="e.g., 4.50%" />
          </div>
        </div>
        <div class="field">
          <label>Purchase price ($)</label>
          <input type="text" placeholder="e.g., 1,125,000" />
          <div class="field-hint">Arm's length consideration paid by buyer to seller</div>
        </div>
      </div>

      <div id="fields-redemption" class="hidden">
        <div class="field-row">
          <div class="field">
            <label>Holder being redeemed</label>
            <select><option value="">Select holder...</option><option>Sullivan Irrevocable Trust</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option></select>
          </div>
          <div class="field">
            <label>Equity class</label>
            <select><option>LP interest (%)</option><option>GP interest (%)</option></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Amount redeemed</label>
            <input type="text" placeholder="e.g., 3.00%" />
          </div>
          <div class="field">
            <label>Redemption price ($)</label>
            <input type="text" placeholder="e.g., 780,000" />
          </div>
        </div>
        <div class="field">
          <label>Reallocation method</label>
          <select>
            <option>Pro rata to remaining holders</option>
            <option>Retire interest (reduce total)</option>
            <option>Custom allocation</option>
          </select>
          <div class="field-hint">How the redeemed interest is redistributed</div>
        </div>
      </div>

      <div id="fields-issuance" class="hidden">
        <div class="field-row">
          <div class="field">
            <label>Holder</label>
            <select><option value="">Select holder...</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option><option>Sullivan Irrevocable Trust</option><option style="color: #534AB7;">+ Add new holder...</option></select>
          </div>
          <div class="field">
            <label>Equity class</label>
            <select><option>LP interest (%)</option><option>GP interest (%)</option></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Amount issued</label>
            <input type="text" placeholder="e.g., 8.00%" />
          </div>
          <div class="field">
            <label>Capital contribution ($)</label>
            <input type="text" placeholder="e.g., 2,000,000" />
          </div>
        </div>
        <div class="field">
          <label>Dilution method</label>
          <select>
            <option>Dilute all existing holders pro rata</option>
            <option>Dilute specific holders only</option>
            <option>No dilution (from authorized but unissued)</option>
          </select>
        </div>
      </div>

      <div id="fields-estate" class="hidden">
        <div class="field-row">
          <div class="field">
            <label>From (decedent / estate)</label>
            <select><option value="">Select holder...</option><option>Sullivan Irrevocable Trust</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option></select>
          </div>
          <div class="field">
            <label>To (beneficiary / successor)</label>
            <select><option value="">Select transferee...</option><option>Bunker Family Trust</option><option>Peterson Holdings, LLC</option><option>Chen Investment Partners</option><option>Martinez Living Trust</option><option>Whitfield Capital, LP</option><option>Nakamura Family Office</option><option>Sullivan Irrevocable Trust</option><option style="color: #534AB7;">+ Add new holder...</option></select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Equity class</label>
            <select><option>LP interest (%)</option><option>GP interest (%)</option></select>
          </div>
          <div class="field">
            <label>Amount transferred</label>
            <input type="text" placeholder="e.g., 25.00%" />
          </div>
        </div>
        <div class="field">
          <label>Legal basis</label>
          <select>
            <option>Probate order</option>
            <option>Trust succession</option>
            <option>Beneficiary designation</option>
            <option>Court order</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="section-label">Notes &amp; attachments</div>

      <div class="field">
        <label>Description</label>
        <textarea placeholder="Describe what happened and why. This becomes the log entry."></textarea>
      </div>

      <div class="field">
        <label>Supporting documents</label>
        <div class="drop-zone">
          <div class="drop-icon">Drag files here or <strong>browse</strong><br/>Gift letters, transfer agreements, court orders, board resolutions</div>
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn-m">Cancel</button>
      <button class="btn-m">Save as draft</button>
      <button class="btn-m btn-m-primary">Record transaction</button>
    </div>
  </div>
</div>

<script>
var pills = document.querySelectorAll('.type-pill');
var allFields = ['gift','sale','redemption','issuance','estate'];

pills.forEach(function(pill) {
  pill.addEventListener('click', function() {
    pills.forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    var t = pill.dataset.type;
    allFields.forEach(function(f) {
      var el = document.getElementById('fields-' + f);
      if (f === t) { el.classList.remove('hidden'); } else { el.classList.add('hidden'); }
    });
  });
});
</script>
